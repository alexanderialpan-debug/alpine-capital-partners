<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alpine Capital Partners</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#050505;
  color:white;
}

header{
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #222;
}

button{
  padding:10px;
  background:linear-gradient(135deg,#f4df9a,#d7a947);
  border:0;
  font-weight:800;
  cursor:pointer;
}

.card{
  background:#0a0a0a;
  padding:20px;
  margin:20px;
  border-radius:10px;
  border:1px solid #222;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:10px 0;
  background:#050505;
  border:1px solid #333;
  color:white;
}

.admin{display:none}
.gold{color:#d7a947}
</style>
</head>

<body>

<header>
  <h2>Alpine Capital Command Centre</h2>
  <button onclick="logout()">Logout</button>
</header>

<div id="loginBox" class="card">
  <h3>Admin Login</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password">
  <button onclick="login()">Login</button>
  <p id="loginMessage"></p>
</div>

<div id="adminPanel" class="admin">

  <div class="card">
    <h3 class="gold">Admin Status</h3>
    <button onclick="setOnline()">Online</button>
    <button onclick="setOffline()">Offline</button>
  </div>

  <div class="card">
    <h3 class="gold">Investors</h3>
    <div id="investors"></div>
  </div>

  <div class="card">
    <h3 class="gold">Messages</h3>
    <div id="messages"></div>
  </div>

  <div class="card">
    <h3 class="gold">Leads</h3>
    <div id="leads"></div>
  </div>

</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  doc,
  updateDoc,
  deleteDoc,
  addDoc,
  query,
  orderBy,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.login = async function(){
  try{
    await signInWithEmailAndPassword(auth,email.value,password.value);
    loginBox.style.display="none";
    adminPanel.style.display="block";

    loadInvestors();
    loadMessages();
    loadLeads();

  }catch{
    loginMessage.innerText="Login failed";
  }
};

window.logout = async function(){
  await signOut(auth);
  location.reload();
};

window.setOnline = async function(){
  await updateDoc(doc(db,"settings","adminStatus"),{
    status:"Online"
  });
};

window.setOffline = async function(){
  await updateDoc(doc(db,"settings","adminStatus"),{
    status:"Offline",
    lastOnline:serverTimestamp()
  });
};

function loadInvestors(){
  onSnapshot(collection(db,"investors"), snap=>{
    investors.innerHTML="";
    snap.forEach(docSnap=>{
      const d=docSnap.data();
      const id=docSnap.id;

      investors.innerHTML+=`
      <div class="card">
        <strong>${d.name || "Investor"}</strong><br>
        ${d.email || ""}

        <input id="ti-${id}" value="${d.totalInvestment||0}">
        <button onclick="updateInvestor('${id}')">Update</button>
        <button onclick="deleteInvestor('${id}')">Delete</button>
      </div>`;
    });
  });
}

window.updateInvestor = async function(id){
  await updateDoc(doc(db,"investors",id),{
    totalInvestment:Number(document.getElementById("ti-"+id).value)
  });
};

window.deleteInvestor = async function(id){
  await deleteDoc(doc(db,"investors",id));
};

function loadMessages(){
  const q=query(collection(db,"messages"),orderBy("createdAt","desc"));

  onSnapshot(q,snap=>{
    messages.innerHTML="";
    snap.forEach(docSnap=>{
      const d=docSnap.data();
      const id=docSnap.id;

      messages.innerHTML+=`
      <div class="card">
        <strong>${d.email}</strong><br>
        ${d.message}<br>

        <input id="reply-${id}">
        <button onclick="reply('${id}')">Reply</button>
        <button onclick="deleteMsg('${id}')">Delete</button>
      </div>`;
    });
  });
}

window.reply = async function(id){
  await updateDoc(doc(db,"messages",id),{
    reply:document.getElementById("reply-"+id).value,
    repliedAt:serverTimestamp()
  });
};

window.deleteMsg = async function(id){
  await deleteDoc(doc(db,"messages",id));
};

function loadLeads(){
  onSnapshot(collection(db,"leads"),snap=>{
    leads.innerHTML="";
    snap.forEach(docSnap=>{
      const d=docSnap.data();
      const id=docSnap.id;

      leads.innerHTML+=`
      <div class="card">
        ${d.name}<br>
        ${d.email}<br>

        <button onclick="approveLead('${id}')">Approve</button>
        <button onclick="deleteLead('${id}')">Delete</button>
      </div>`;
    });
  });
}

window.approveLead = async function(id){
  await updateDoc(doc(db,"leads",id),{
    status:"Approved"
  });
};

window.deleteLead = async function(id){
  await deleteDoc(doc(db,"leads",id));
};
</script>

</body>
</html>
