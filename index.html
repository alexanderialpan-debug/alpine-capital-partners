<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpine Capital Partners</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;background:#050505;color:#fff;font-family:Inter}
header{position:fixed;width:100%;background:#000;padding:15px 40px;display:flex;justify-content:space-between;align-items:center}
.logo img{height:50px}
.hero{height:100vh;display:flex;align-items:center;padding:100px;background:#000}
.portal{padding:80px}
.portal-box{max-width:400px;margin:auto;background:#111;padding:30px}
.dashboard{display:none}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-top:20px}
.stat{background:#111;padding:20px}
.admin{display:none;background:#111;padding:30px;margin-top:40px}
input{width:100%;padding:10px;margin:5px 0;background:#000;color:#fff;border:1px solid #333}
button{padding:12px;background:gold;border:0;margin-top:10px;cursor:pointer;width:100%}
</style>
</head>

<body>

<header>
<div class="logo"><img src="logo.jpg"></div>
</header>

<section class="hero">
<h1>Alpine Capital Partners</h1>
</section>

<section class="portal">

<div id="loginBox" class="portal-box">
<h2>Investor Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="loginMessage"></p>
</div>

<div id="dashboard" class="dashboard">
<h2 id="welcome"></h2>

<div class="stats">
<div class="stat">Investment <strong id="inv"></strong></div>
<div class="stat">Value <strong id="val"></strong></div>
<div class="stat">Returns <strong id="ret"></strong></div>
<div class="stat">Due <strong id="due"></strong></div>
</div>

<canvas id="chart" style="margin-top:30px;"></canvas>

<button onclick="logout()">Logout</button>

<div id="adminPanel" class="admin">
<h2>Admin Panel</h2>
<div id="investors"></div>
</div>

</div>

</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const app = initializeApp({
apiKey: "AIzaSyDplPf7cJQ9wK7FHM2NGexjNQegH1IPYHk",
authDomain: "alpine-capital-partners.firebaseapp.com",
projectId: "alpine-capital-partners"
});

const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN = "GiBsDVrlumWZcRXAmP7v7iDvsoE2";

function money(x){return "$"+Number(x).toLocaleString();}

async function load(user){
const snap = await getDoc(doc(db,"investors",user.uid));

if(!snap.exists()){
document.getElementById("loginMessage").innerText="Not approved";
await signOut(auth);
return;
}

const d = snap.data();

loginBox.style.display="none";
dashboard.style.display="block";

welcome.innerText="Welcome "+d.name;
inv.innerText=money(d.totalInvestment);
val.innerText=money(d.currentValue);
ret.innerText=money(d.totalReturns);
due.innerText=money(d.paymentDue);

new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:["Start","Now"],
datasets:[{data:[d.totalInvestment,d.currentValue],borderColor:"gold"}]
}
});

if(user.uid===ADMIN){
adminPanel.style.display="block";
loadAdmin();
}
}

async function loadAdmin(){
const q = await getDocs(collection(db,"investors"));
q.forEach(docSnap=>{
const d = docSnap.data();
const id = docSnap.id;

investors.innerHTML+=`
<div>
<p>${d.name}</p>
<input id="inv-${id}" value="${d.totalInvestment}">
<button onclick="save('${id}')">Save</button>
</div>
`;
});
}

window.save = async function(id){
await updateDoc(doc(db,"investors",id),{
totalInvestment:Number(document.getElementById("inv-"+id).value)
});
alert("Updated");
}

window.login = async function(){
try{
await signInWithEmailAndPassword(auth,email.value,password.value);
}catch{
loginMessage.innerText="Login failed";
}
}

window.logout = ()=>signOut(auth);

onAuthStateChanged(auth,u=>{
if(u) load(u);
});
</script>

</body>
</html>
