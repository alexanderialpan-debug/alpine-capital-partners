<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpine Capital Partners</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Inter;
  background:radial-gradient(circle at top left, rgba(215,169,71,.08), transparent 30%), #050505;
  color:#fff;
}
h1,h2{font-family:"Cormorant Garamond",serif}
.gold{color:#d7a947}

header{
  position:fixed;
  width:100%;
  padding:20px 60px;
  display:flex;
  justify-content:space-between;
  background:rgba(0,0,0,.9);
  box-shadow:0 20px 60px rgba(0,0,0,.6);
  z-index:999;
}
.logo img{height:70px}

.hero{
  height:100vh;
  display:flex;
  align-items:center;
  padding:120px;
  background:
    linear-gradient(90deg,#000,rgba(0,0,0,.7)),
    url("https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=2000&q=90") center/cover;
}
.hero h1{
  font-size:90px;
  text-shadow:0 20px 60px rgba(0,0,0,.9);
}

.portal{padding:100px}

input,textarea{
  width:100%;
  padding:14px;
  margin:10px 0;
  background:#000;
  border:1px solid #333;
  color:#fff;
}
button{
  width:100%;
  padding:14px;
  background:#d7a947;
  border:0;
  font-weight:800;
  cursor:pointer;
}

.dashboard,.admin{display:none}

.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  margin-top:30px;
}
.stat{
  background:#111;
  padding:20px;
  border:1px solid rgba(215,169,71,.3);
}

.box{
  margin-top:40px;
  padding:25px;
  background:#111;
  border:1px solid rgba(215,169,71,.3);
}
</style>
</head>

<body>

<header>
<div class="logo"><img src="logo.png"></div>
</header>

<section class="hero">
<div>
<h1>Alpine Capital</h1>
<a href="#portal" class="gold">Investor Access</a>
</div>
</section>

<section id="portal" class="portal">

<div id="loginBox">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="loginMessage"></p>
</div>

<div id="dashboard" class="dashboard">

<h2 id="welcomeName"></h2>

<div class="stats">
<div class="stat">Tier<br><strong id="tier"></strong></div>
<div class="stat">Investment<br><strong id="invest"></strong></div>
<div class="stat">Returns<br><strong id="returns"></strong></div>
<div class="stat">Return %<br><strong id="percent"></strong></div>
</div>

<div class="box">
<h3>Notes</h3>
<p id="notes"></p>
</div>

<div class="box">
<h3>Transactions</h3>
<div id="transactions"></div>
</div>

<div class="box">
<h3>Reports</h3>
<a id="r1" target="_blank">Investment Summary</a><br>
<a id="r2" target="_blank">Monthly Statement</a><br>
<a id="r3" target="_blank">Tax Report</a><br>
<a id="r4" target="_blank">Agreement</a>
</div>

<canvas id="chart"></canvas>

<button onclick="logout()">Logout</button>

<div id="adminPanel" class="admin">
<h2>Admin</h2>
<div id="leadList"></div>
</div>

</div>
</section>

<section style="padding:100px;text-align:center">
<h2>Contact</h2>
<input id="ln" placeholder="Name">
<input id="le" placeholder="Email">
<textarea id="lm"></textarea>
<button onclick="sendLead()">Send</button>
<p id="ls"></p>
</section>

<footer style="padding:40px;text-align:center;border-top:1px solid #333;">
<p>© 2026 Alpine Capital Partners. All Rights Reserved.</p>
</footer>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDplPf7cJQ9wK7FHM2NGexjNQegH1IPYHk",
  authDomain: "alpine-capital-partners.firebaseapp.com",
  projectId: "alpine-capital-partners",
  storageBucket: "alpine-capital-partners.firebasestorage.app",
  messagingSenderId: "369382075896",
  appId: "1:369382075896:web:79af780ff267c0f335fa0d",
  measurementId: "G-LNJ80RTYW6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_UID = "GiBsDVrlumWZcRXAmP7v7iDvsoE2";

function money(v){
  return "$" + Number(v || 0).toLocaleString();
}

async function loadInvestor(user){
  const snap = await getDoc(doc(db, "investors", user.uid));

  if(!snap.exists()){
    document.getElementById("loginMessage").innerText = "Account exists, but investor profile is not approved yet.";
    await signOut(auth);
    return;
  }

  const d = snap.data();

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("dashboard").style.display = "block";

  document.getElementById("welcomeName").innerText = "Welcome " + (d.name || user.email);
  document.getElementById("tier").innerText = d.tier || "Standard";
  document.getElementById("invest").innerText = money(d.totalInvestment);
  document.getElementById("returns").innerText = money(d.totalReturns);

  const pct = d.totalInvestment > 0 ? (d.totalReturns / d.totalInvestment) * 100 : 0;
  document.getElementById("percent").innerText = pct.toFixed(2) + "%";

  document.getElementById("notes").innerText = d.notes || "No notes available.";

  document.getElementById("transactions").innerHTML = `
    <p>Initial Capital Contribution: ${money(d.transaction1Amount || 250000)}</p>
    <p>Monthly Return Distribution: ${money(d.transaction2Amount || 3750)}</p>
    <p>Management Fee: ${money(d.transaction3Amount || -750)}</p>
    <p>Upcoming Payment Due: ${money(d.transaction4Amount || 5250)}</p>
  `;

  document.getElementById("r1").href = d.report1 || "#";
  document.getElementById("r2").href = d.report2 || "#";
  document.getElementById("r3").href = d.report3 || "#";
  document.getElementById("r4").href = d.report4 || "#";

  new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels: ["Investment", "Current Value", "Returns"],
      datasets: [{
        label: "Portfolio Overview",
        data: [
          Number(d.totalInvestment || 0),
          Number(d.currentValue || 0),
          Number(d.totalReturns || 0)
        ],
        borderColor: "#d7a947",
        backgroundColor: "rgba(215,169,71,.15)",
        fill: true,
        tension: .35
      }]
    },
    options: {
      plugins: {
        legend: {
          labels: { color: "#fff" }
        }
      },
      scales: {
        x: { ticks: { color: "#aaa" }, grid: { color: "#222" } },
        y: { ticks: { color: "#aaa" }, grid: { color: "#222" } }
      }
    }
  });

  if(user.uid === ADMIN_UID){
    document.getElementById("adminPanel").style.display = "block";
    loadLeads();
  } else {
    document.getElementById("adminPanel").style.display = "none";
  }
}

async function loadLeads(){
  const q = await getDocs(collection(db, "leads"));
  const leadList = document.getElementById("leadList");
  leadList.innerHTML = "";

  q.forEach(docSnap => {
    const d = docSnap.data();
    leadList.innerHTML += `
      <div style="padding:15px;border:1px solid #333;margin-top:12px;">
        <p><strong class="gold">${d.name || "No Name"}</strong></p>
        <p>${d.email || ""}</p>
        <p>${d.message || ""}</p>
      </div>
    `;
  });
}

window.login = async function(){
  document.getElementById("loginMessage").innerText = "";

  try{
    await signInWithEmailAndPassword(
      auth,
      document.getElementById("email").value,
      document.getElementById("password").value
    );
  }catch{
    document.getElementById("loginMessage").innerText = "Login failed.";
  }
}

window.logout = async function(){
  await signOut(auth);
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("loginBox").style.display = "block";
  document.getElementById("adminPanel").style.display = "none";
}

window.sendLead = async function(){
  await addDoc(collection(db, "leads"), {
    name: document.getElementById("ln").value,
    email: document.getElementById("le").value,
    message: document.getElementById("lm").value
  });

  document.getElementById("ls").innerText = "Sent successfully.";
  document.getElementById("ln").value = "";
  document.getElementById("le").value = "";
  document.getElementById("lm").value = "";
}

onAuthStateChanged(auth, (user) => {
  if(user){
    loadInvestor(user);
  }
});
</script>

</body>
</html>
