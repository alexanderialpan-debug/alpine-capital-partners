<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alpine Capital – Investor Portal</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#d7a947">

<link rel="icon" href="favicon.svg">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Inter;
  background:radial-gradient(circle at top,#1a1308,#050505 40%,#000);
  color:#fff;
}

/* APP CONTAINER */
.app{
  max-width:520px;
  margin:auto;
  min-height:100vh;
  padding:20px;
}

/* LOGO */
.logo{text-align:center;margin:20px 0}
.logo img{height:85px}

/* CARDS */
.card{
  background:rgba(15,15,15,.9);
  border:1px solid rgba(215,169,71,.25);
  padding:22px;
  margin:16px 0;
  border-radius:22px;
  backdrop-filter:blur(18px);
  box-shadow:0 25px 80px rgba(0,0,0,.7);
}

/* LOGIN */
.login-title{
  font-size:28px;
  font-weight:900;
}

/* INPUT */
input,textarea{
  width:100%;
  padding:14px;
  margin:10px 0;
  background:#050505;
  border:1px solid #333;
  color:white;
  border-radius:14px;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  background:linear-gradient(135deg,#f4df9a,#d7a947);
  border:0;
  color:#000;
  font-weight:900;
  border-radius:14px;
  letter-spacing:1px;
}

/* DASHBOARD */
.dashboard{display:none}

/* HEADER */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.topbar h2{
  font-size:20px;
}

.logout{
  font-size:12px;
  color:#d7a947;
  cursor:pointer;
}

/* STATS GRID */
.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:15px;
}

.stat{
  background:#0a0a0a;
  padding:16px;
  border-radius:16px;
  border:1px solid rgba(215,169,71,.2);
}

.stat small{
  font-size:10px;
  text-transform:uppercase;
  color:#999;
  font-weight:900;
}

.stat strong{
  display:block;
  font-size:20px;
  margin-top:6px;
}

/* CHART */
.chart-box{
  margin-top:10px;
}

/* CHAT */
.chat-window{
  height:320px;
  overflow:auto;
  background:#050505;
  border-radius:16px;
  padding:12px;
  border:1px solid rgba(215,169,71,.2);
}

.bubble{
  max-width:80%;
  padding:12px;
  margin:8px 0;
  border-radius:14px;
  font-size:14px;
}

.user{
  margin-left:auto;
  background:linear-gradient(135deg,#d7a947,#f4df9a);
  color:#000;
}

.admin{
  margin-right:auto;
  background:#1a1a1a;
}

/* SEND */
textarea{
  min-height:70px;
}

/* GOLD TEXT */
.gold{color:#d7a947}

</style>
</head>

<body>

<div class="app">

<!-- LOGO -->
<div class="logo">
  <img src="logo.png">
</div>

<!-- LOGIN -->
<div id="loginBox" class="card">
  <div class="login-title">Private Investor Access</div>
  <p class="gold">Alpine Capital Partners</p>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <p id="loginMessage"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">

  <div class="topbar">
    <h2 id="welcomeName">Welcome</h2>
    <div class="logout" onclick="logout()">Logout</div>
  </div>

  <p id="userEmail"></p>

  <!-- STATS -->
  <div class="stats">
    <div class="stat"><small>Investment</small><strong id="totalInvestment">$0</strong></div>
    <div class="stat"><small>Value</small><strong id="currentValue">$0</strong></div>
    <div class="stat"><small>Returns</small><strong id="totalReturns">$0</strong></div>
    <div class="stat"><small>KYC</small><strong id="kycStatus">Pending</strong></div>
  </div>

  <!-- CHART -->
  <div class="card chart-box">
    <canvas id="chart"></canvas>
  </div>

  <!-- CHAT -->
  <div class="card">
    <h3>Secure Chat</h3>

    <div id="chat" class="chat-window"></div>

    <textarea id="msg" placeholder="Write message..."></textarea>
    <button onclick="send()">Send</button>
  </div>

</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, addDoc, query, where, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDplPf7cJQ9wK7FHM2NGexjNQegH1IPYHk",
  authDomain: "alpine-capital-partners.firebaseapp.com",
  projectId: "alpine-capital-partners",
  storageBucket: "alpine-capital-partners.firebasestorage.app",
  messagingSenderId: "369382075896",
  appId: "1:369382075896:web:79af780ff267c0f335fa0d",
  measurementId: "G-LNJ80RTYW6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let chartInstance = null;
let unsubscribeChat = null;

function money(value){
  return "$" + Number(value || 0).toLocaleString();
}

function timeText(timestamp){
  if(!timestamp || !timestamp.toDate) return "";
  return timestamp.toDate().toLocaleString("en-AU", {
    day: "2-digit",
    month: "short",
    hour: "2-digit",
    minute: "2-digit"
  });
}

window.login = async function(){
  document.getElementById("loginMessage").innerText = "";

  try{
    const result = await signInWithEmailAndPassword(
      auth,
      document.getElementById("email").value,
      document.getElementById("password").value
    );

    currentUser = result.user;
    await loadInvestor(currentUser);

  }catch(error){
    document.getElementById("loginMessage").innerText = "Access denied. Check email/password.";
  }
};

async function loadInvestor(user){
  currentUser = user;

  const snap = await getDoc(doc(db, "investors", user.uid));

  if(!snap.exists()){
    alert("Investor profile is not approved yet.");
    await signOut(auth);
    return;
  }

  const data = snap.data();

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("dashboard").style.display = "block";

  document.getElementById("welcomeName").innerText = "Welcome, " + (data.name || "Investor");
  document.getElementById("userEmail").innerText = user.email;

  document.getElementById("totalInvestment").innerText = money(data.totalInvestment);
  document.getElementById("currentValue").innerText = money(data.currentValue);
  document.getElementById("totalReturns").innerText = money(data.totalReturns);
  document.getElementById("kycStatus").innerText = data.kycStatus || "Not Submitted";

  renderChart(data);
  listenChat();
}

function renderChart(data){
  const ctx = document.getElementById("chart");

  if(chartInstance){
    chartInstance.destroy();
  }

  chartInstance = new Chart(ctx, {
    type: "line",
    data: {
      labels: ["Investment", "Current Value", "Returns"],
      datasets: [{
        label: "Portfolio",
        data: [
          Number(data.totalInvestment || 0),
          Number(data.currentValue || 0),
          Number(data.totalReturns || 0)
        ],
        borderColor: "#d7a947",
        backgroundColor: "rgba(215,169,71,.18)",
        fill: true,
        tension: 0.4
      }]
    },
    options: {
      animation: { duration: 1600 },
      plugins: {
        legend: {
          labels: { color: "#fff" }
        }
      },
      scales: {
        x: {
          ticks: { color: "#aaa" },
          grid: { color: "#222" }
        },
        y: {
          ticks: { color: "#aaa" },
          grid: { color: "#222" }
        }
      }
    }
  });
}

function listenChat(){
  const chat = document.getElementById("chat");

  if(unsubscribeChat){
    unsubscribeChat();
  }

  const q = query(
    collection(db, "messages"),
    where("uid", "==", currentUser.uid),
    orderBy("createdAt", "asc")
  );

  unsubscribeChat = onSnapshot(q, snapshot => {
    chat.innerHTML = "";

    snapshot.forEach(item => {
      const data = item.data();

      chat.innerHTML += `
        <div class="bubble user">
          ${data.message || data.text || ""}
          <small>${timeText(data.createdAt)} • ${data.status || "Open"}</small>
        </div>
      `;

      if(data.reply){
        chat.innerHTML += `
          <div class="bubble admin">
            ${data.reply}
            <small>Alpine Capital Partners • ${timeText(data.repliedAt)}</small>
          </div>
        `;
      }
    });

    chat.scrollTop = chat.scrollHeight;
  });
}

window.send = async function(){
  const box = document.getElementById("msg");
  const message = box.value.trim();

  if(!message){
    alert("Write a message first.");
    return;
  }

  await addDoc(collection(db, "messages"), {
    uid: currentUser.uid,
    email: currentUser.email,
    message: message,
    reply: "",
    status: "Open",
    createdAt: serverTimestamp()
  });

  box.value = "";
};

window.logout = async function(){
  if(unsubscribeChat){
    unsubscribeChat();
  }

  await signOut(auth);

  currentUser = null;
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("loginBox").style.display = "block";
};

onAuthStateChanged(auth, user => {
  if(user){
    loadInvestor(user);
  }
});
</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/service-worker.js");
}
</script>

</div>
</body>
</html>
